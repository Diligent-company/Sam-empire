<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video za Viwanja Kigamboni &mdash; SAM EMPIRE</title>
  <meta name="description" content="Tazama video za viwanja vyetu Kigamboni — ziara za viwanja, ushuhuda wa wateja, na mwongozo wa ununuzi wa ardhi. SAM EMPIRE." />
  <meta name="theme-color" content="#081F4D" />
  <link rel="canonical" href="https://samempire.co.tz/videos.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SAM EMPIRE" />
  <meta property="og:title" content="Video — SAM EMPIRE" />
  <meta property="og:image" content="https://samempire.co.tz/assets/img/og-image.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("sam:theme");
        var saved = raw ? JSON.parse(raw) : null;
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
      } catch (e) {}
    })();
  </script>
  <style>
    .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-6); }
    @media (max-width: 900px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .video-grid { grid-template-columns: 1fr; } }
    .video-card { overflow: hidden; cursor: pointer; }
    .video-card__media { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--grad-navy); }
    .video-card__media img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--t-slow) var(--ease); }
    .video-card:hover .video-card__media img { transform: scale(1.06); }
    .video-card__play { position: absolute; inset: 0; display: grid; place-items: center; }
    .video-card__play span { width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center; background: var(--glass-navy); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border: 1px solid var(--glass-navy-border); color: #fff; transition: all var(--t-base) var(--ease); }
    .video-card:hover .video-card__play span { background: var(--c-gold); color: var(--c-navy-900); transform: scale(1.08); }
    .video-card__dur { position: absolute; bottom: var(--s-3); right: var(--s-3); font-family: var(--font-mono); font-size: var(--fs-2xs); color: #fff; background: var(--glass-navy); border: 1px solid var(--glass-navy-border); padding: 0.25em 0.6em; border-radius: var(--r-xs); }
    .modal--video { max-width: 900px !important; }
    .video-embed { position: relative; aspect-ratio: 16/9; border-radius: var(--r-md); overflow: hidden; background: #000; }
    .video-embed iframe, .video-embed video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>

<body data-page="videos" data-header="solid">
  <main id="main">
    <section class="page-banner">
      <div class="container container-wide page-banner__inner">
        <nav class="crumbs" aria-label="Njia ya ukurasa"><a href="/">Nyumbani</a><span class="is-current">Video</span></nav>
        <h1 class="mt-3">Video za SAM EMPIRE</h1>
        <p class="mt-3">Ziara za viwanja, ushuhuda wa wateja, na miongozo ya ununuzi wa ardhi Kigamboni — yote kwa video.</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-wide">
        <div class="video-grid" id="video-grid">
          <div class="card-skeleton skeleton" style="aspect-ratio:16/9;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:16/9;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:16/9;height:auto"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/partials.js"></script>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/videos.js"></script>
</body>
</html>
