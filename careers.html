<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ajira &mdash; SAM EMPIRE</title>
  <meta name="description" content="Jiunge na timu ya SAM EMPIRE. Tazama nafasi za ajira zinazopatikana na uombe kufanya kazi nasi Kigamboni, Dar es Salaam." />
  <meta name="theme-color" content="#081F4D" />
  <link rel="canonical" href="https://samempire.co.tz/careers.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SAM EMPIRE" />
  <meta property="og:title" content="Ajira — SAM EMPIRE" />
  <meta property="og:image" content="https://samempire.co.tz/assets/img/og-image.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("sam:theme");
        var saved = raw ? JSON.parse(raw) : null;
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
      } catch (e) {}
    })();
  </script>
  <style>
    .job-card { display: flex; flex-direction: column; gap: var(--s-3); }
    .job-meta { display: flex; flex-wrap: wrap; gap: var(--s-2); }
    .job-chip { font-size: var(--fs-xs); font-weight: 600; color: var(--text-muted); background: var(--surface-3); border-radius: var(--r-pill); padding: 0.35em 0.8em; display: inline-flex; align-items: center; gap: 0.4em; }
    .req-list { margin-top: var(--s-2); }
    .req-list li { display: flex; gap: 0.5em; align-items: flex-start; color: var(--text-muted); font-size: var(--fs-sm); margin-top: var(--s-2); }
    .req-list svg { flex: none; color: var(--c-success); margin-top: 3px; }
  </style>
</head>

<body data-page="" data-header="solid">
  <main id="main">
    <section class="page-banner">
      <div class="container container-wide page-banner__inner">
        <nav class="crumbs" aria-label="Njia ya ukurasa"><a href="/">Nyumbani</a><span class="is-current">Ajira</span></nav>
        <h1 class="mt-3">Fanya Kazi Nasi</h1>
        <p class="mt-3">Tunatafuta watu wenye bidii na uadilifu kujiunga na timu ya SAM EMPIRE. Tazama nafasi zilizopo na uombe leo.</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-wide">
        <div class="grid grid-2" id="careers-list">
          <div class="card-skeleton skeleton" style="height:280px"></div>
          <div class="card-skeleton skeleton" style="height:280px"></div>
        </div>

        <div class="card mt-8" data-reveal>
          <div class="card-body text-center">
            <h3 class="h4">Hukupata nafasi inayokufaa?</h3>
            <p class="text-muted mt-2">Tutumie maombi ya jumla — tutakutafuta nafasi inapotokea.</p>
            <button class="btn btn-gold mt-5" id="general-apply" type="button">Tuma Maombi ya Jumla</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/partials.js"></script>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/careers.js"></script>
</body>
</html>
