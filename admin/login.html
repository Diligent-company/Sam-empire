<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — SAM EMPIRE</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#081F4D" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("sam:theme");
        var saved = raw ? JSON.parse(raw) : null;
        document.documentElement.setAttribute("data-theme", saved || "light");
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="admin-login">
    <div class="admin-login__card" data-reveal>
      <div class="admin-brand" style="border:0;padding:0;margin-bottom:var(--s-5);justify-content:center">
        <img src="/assets/icons/logo.svg" alt="" style="width:40px;height:40px" />
        <div><b style="color:var(--text)">SAM EMPIRE</b><span>Admin Console</span></div>
      </div>

      <div id="notice" class="notice mb-5" hidden style="border:1px dashed var(--border-strong);border-radius:var(--r-md);padding:var(--s-4);font-size:var(--fs-sm);text-align:center"></div>

      <div id="signed-in-other" hidden class="text-center">
        <p class="text-muted mb-4">Umeingia kwa akaunti isiyo ya admin. Toka kwanza ili kuingia kama admin.</p>
        <button class="btn btn-outline btn-block" id="signout-other" type="button">Toka</button>
      </div>

      <div id="login-form">
        <div class="field mb-4">
          <label class="label" for="ad-email">Barua Pepe ya Admin</label>
          <input class="input" id="ad-email" type="email" autocomplete="username" placeholder="admin@samempire.co.tz" />
        </div>
        <div class="field mb-5">
          <label class="label" for="ad-pass">Nenosiri</label>
          <input class="input" id="ad-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-gold btn-lg btn-block" id="ad-submit" type="button">Ingia</button>
        <p class="hint text-center mt-4">Sehemu hii ni kwa wasimamizi pekee.</p>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/admin-auth.js"></script>
</body>
</html>
