<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashibodi — SAM EMPIRE Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#081F4D" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <script>
    (function () { try { var raw = localStorage.getItem("sam:theme"); document.documentElement.setAttribute("data-theme", raw ? JSON.parse(raw) : "light"); } catch (e) {} })();
  </script>
</head>
<body data-page="dashboard" data-title="Dashibodi">
  <div class="admin-gate" id="admin-gate"><div class="admin-loading"><span class="spinner" style="width:40px;height:40px"></span></div></div>

  <div class="admin-shell" id="admin-shell" hidden>
    <div class="admin-main">
      <div class="admin-content" id="admin-content">

        <div class="admin-stats">
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M3 21h18M5 21V9l7-5 7 5v12" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span><div class="astat__label">Viwanja</div><div class="astat__value" id="m-properties">—</div><div class="astat__delta" id="m-published"></div></div>
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M16 11a4 4 0 10-8 0M4 21a8 8 0 0116 0" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="7" r="3" stroke="currentColor" stroke-width="1.8"/></svg></span><div class="astat__label">Miongozo Mipya</div><div class="astat__value" id="m-leadsNew">—</div><div class="astat__delta" id="m-leadsTotal"></div></div>
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8"/></svg></span><div class="astat__label">Miadi Inayosubiri</div><div class="astat__value" id="m-appts">—</div></div>
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.8"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="1.8"/></svg></span><div class="astat__label">Uhifadhi (Reserve)</div><div class="astat__value" id="m-reservations">—</div></div>
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.8"/></svg></span><div class="astat__label">Wasajili</div><div class="astat__value" id="m-subscribers">—</div></div>
          <div class="astat"><span class="astat__icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M4 19V5M4 19h16M8 15l3-4 3 2 4-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><div class="astat__label">Mauzo Yaliyokamilika</div><div class="astat__value" id="m-sold">—</div><div class="astat__delta up" id="m-conversion"></div></div>
        </div>

        <div class="grid grid-2 mt-6" style="align-items:stretch">
          <div class="panel">
            <div class="panel__head"><h2>Shughuli (siku 30)</h2></div>
            <div class="panel__body"><div style="height:300px"><canvas id="chart-activity"></canvas></div></div>
          </div>
          <div class="panel">
            <div class="panel__head"><h2>Mfumo wa Miongozo</h2></div>
            <div class="panel__body"><div style="height:300px"><canvas id="chart-funnel"></canvas></div></div>
          </div>
        </div>

        <div class="grid grid-2 mt-6" style="align-items:start">
          <div class="panel">
            <div class="panel__head"><h3>Viwanja Vinavyovutia Zaidi</h3></div>
            <div class="panel__body"><div id="top-props" class="flex flex-col gap-3"><p class="text-muted text-sm">Inapakia…</p></div></div>
          </div>
          <div class="panel">
            <div class="panel__head"><h3>Maeneo Maarufu</h3></div>
            <div class="panel__body"><div id="pop-locs" class="flex flex-col gap-3"><p class="text-muted text-sm">Inapakia…</p></div></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/admin-core.js"></script>
  <script type="module" src="/assets/js/admin-dashboard.js"></script>
</body>
</html>
