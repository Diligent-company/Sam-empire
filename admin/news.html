<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habari — SAM EMPIRE Admin</title><meta name="robots" content="noindex, nofollow" /><meta name="theme-color" content="#081F4D" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/style.css" /><link rel="stylesheet" href="/assets/css/animations.css" /><link rel="stylesheet" href="/assets/css/admin.css" />
<script>(function(){try{var r=localStorage.getItem("sam:theme");document.documentElement.setAttribute("data-theme",r?JSON.parse(r):"light");}catch(e){}})();</script>
<style>.cover-drop{border:2px dashed var(--border-strong);border-radius:var(--r-lg);padding:var(--s-6);text-align:center;color:var(--text-muted);cursor:pointer}.cover-drop.is-drag{border-color:var(--c-gold);background:var(--c-warning-soft)}.cover-preview{width:100%;max-width:340px;border-radius:var(--r-md);border:1px solid var(--border);margin-top:var(--s-3)}</style>
</head>
<body data-page="news" data-title="Habari" data-collection="news">
  <div class="admin-gate" id="admin-gate"><div class="admin-loading"><span class="spinner" style="width:40px;height:40px"></span></div></div>
  <div class="admin-shell" id="admin-shell" hidden>
    <div class="admin-main">
      <div class="admin-content" id="admin-content">

        <div id="list-view">
          <div class="admin-toolbar">
            <input class="input" id="art-search" type="search" placeholder="Tafuta habari…" />
            <select class="select" id="art-status"><option value="">Hali zote</option><option value="published">Imechapishwa</option><option value="draft">Rasimu</option></select>
            <div class="admin-toolbar__spacer"></div>
            <button class="btn btn-gold" id="art-add" type="button">+ Ongeza Habari</button>
          </div>
          <div class="panel"><div class="atable-wrap"><table class="atable">
            <thead><tr><th></th><th>Kichwa</th><th>Kategoria</th><th>Hali</th><th>Tarehe</th><th></th></tr></thead>
            <tbody id="art-tbody"><tr><td colspan="6" class="text-center text-muted" style="padding:var(--s-8)">Inapakia…</td></tr></tbody>
          </table></div></div>
        </div>

        <div id="editor-view" hidden>
          <div class="flex-between mb-5 wrap gap-3">
            <h2 id="editor-title">Habari Mpya</h2>
            <div class="flex gap-2"><button class="btn btn-ghost" id="e-cancel" type="button">Ghairi</button><button class="btn btn-gold" id="e-save" type="button">Hifadhi</button></div>
          </div>
          <div class="panel"><div class="panel__body admin-form">
            <div class="field"><label class="label" for="e-title">Kichwa cha Habari *</label><input class="input" id="e-title" maxlength="160" /></div>
            <div class="row2">
              <div class="field"><label class="label" for="e-category">Kategoria</label><input class="input" id="e-category" placeholder="Uwekezaji, Ushauri, Tangazo…" /></div>
              <div class="field"><label class="label" for="e-status">Hali</label><select class="select" id="e-status"><option value="draft">Rasimu</option><option value="published">Chapisha</option></select></div>
            </div>
            <div class="field"><label class="label" for="e-excerpt">Muhtasari Mfupi</label><textarea class="textarea" id="e-excerpt" rows="2" maxlength="220" placeholder="Sentensi 1-2 zitakazoonekana kwenye orodha…"></textarea></div>
            <div class="field">
              <label class="label">Picha ya Jalada</label>
              <div class="cover-drop" id="cover-drop">
                <p><strong>Bofya au buruta picha hapa</strong></p>
                <p class="hint">Itabanwa na kuwekwa alama ya maji kiotomatiki</p>
                <input type="file" id="cover-file" accept="image/*" hidden />
              </div>
              <img id="cover-preview" class="cover-preview" hidden alt="Jalada" />
              <div id="cover-upl" class="text-xs text-muted mt-2"></div>
            </div>
            <div class="field"><label class="label" for="e-content">Maudhui (HTML inaruhusiwa: &lt;p&gt;, &lt;h3&gt;, &lt;ul&gt;&lt;li&gt;, &lt;a&gt;)</label><textarea class="textarea" id="e-content" rows="14" placeholder="&lt;p&gt;Andika makala yako hapa…&lt;/p&gt;"></textarea></div>
          </div></div>
        </div>

      </div>
    </div>
  </div>
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/admin-core.js"></script>
  <script type="module" src="/assets/js/admin-articles.js"></script>
</body>
</html>
