<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Picha — SAM EMPIRE Admin</title><meta name="robots" content="noindex, nofollow" /><meta name="theme-color" content="#081F4D" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/style.css" /><link rel="stylesheet" href="/assets/css/animations.css" /><link rel="stylesheet" href="/assets/css/admin.css" />
<script>(function(){try{var r=localStorage.getItem("sam:theme");document.documentElement.setAttribute("data-theme",r?JSON.parse(r):"light");}catch(e){}})();</script>
<style>.media-item__cap{position:absolute;inset:auto 0 0 0;padding:8px;background:linear-gradient(transparent,rgba(5,15,38,.85));color:#fff;font-size:11px}.media-item__del{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(5,15,38,.75);color:#fff;display:grid;place-items:center}</style>
</head>
<body data-page="gallery" data-title="Picha">
  <div class="admin-gate" id="admin-gate"><div class="admin-loading"><span class="spinner" style="width:40px;height:40px"></span></div></div>
  <div class="admin-shell" id="admin-shell" hidden>
    <div class="admin-main">
      <div class="admin-content" id="admin-content">
        <div class="panel mb-6"><div class="panel__body">
          <div class="row2" style="align-items:end">
            <div class="field"><label class="label" for="g-category">Kategoria ya Picha Zitakazopakiwa</label><input class="input" id="g-category" placeholder="Viwanja, Ziara, Hati, Matukio…" /></div>
            <div class="dropzone" id="g-dropzone">
              <p><strong>Bofya au buruta picha hapa kupakia</strong></p>
              <p class="hint">Zitabanwa na kuwekwa alama ya maji kiotomatiki</p>
              <input type="file" id="g-file" accept="image/*" multiple hidden />
            </div>
          </div>
          <div id="g-upl" class="flex flex-col gap-2 mt-4"></div>
        </div></div>

        <div class="admin-toolbar">
          <select class="select" id="g-filter"><option value="">Kategoria zote</option></select>
          <div class="admin-toolbar__spacer"></div>
          <span class="text-sm text-muted" id="g-total"></span>
        </div>
        <div class="media-grid" id="g-grid"><p class="text-muted">Inapakia…</p></div>
      </div>
    </div>
  </div>
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/admin-core.js"></script>
  <script type="module" src="/assets/js/admin-gallery.js"></script>
</body>
</html>
