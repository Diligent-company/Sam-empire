<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Picha za Viwanja Kigamboni &mdash; SAM EMPIRE</title>
  <meta name="description" content="Tazama picha za viwanja vyetu, ziara za wateja, hati, na matukio Kigamboni. Mkusanyiko wa picha za SAM EMPIRE." />
  <meta name="theme-color" content="#081F4D" />
  <link rel="canonical" href="https://samempire.co.tz/gallery.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SAM EMPIRE" />
  <meta property="og:title" content="Picha — SAM EMPIRE" />
  <meta property="og:image" content="https://samempire.co.tz/assets/img/og-image.png" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("sam:theme");
        var saved = raw ? JSON.parse(raw) : null;
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
      } catch (e) {}
    })();
  </script>
  <style>
    .gallery-filters { display: flex; gap: var(--s-2); flex-wrap: wrap; justify-content: center; margin-bottom: var(--s-8); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-4); }
    @media (max-width: 768px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .gallery-grid { grid-template-columns: 1fr; } }
    .g-item { position: relative; overflow: hidden; border-radius: var(--r-lg); border: 1px solid var(--border); cursor: zoom-in; aspect-ratio: 4/3; background: var(--c-navy-800); }
    .g-item img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--t-slow) var(--ease); }
    .g-item:hover img { transform: scale(1.06); }
    .g-item__cap { position: absolute; inset: auto 0 0 0; padding: var(--s-5) var(--s-4) var(--s-3); background: linear-gradient(transparent, rgba(5,15,38,0.85)); color: #fff; font-size: var(--fs-sm); font-weight: 600; opacity: 0; transform: translateY(8px); transition: all var(--t-base) var(--ease); }
    .g-item:hover .g-item__cap { opacity: 1; transform: translateY(0); }
    .g-item__tag { position: absolute; top: var(--s-3); left: var(--s-3); }
    .lightbox { position: fixed; inset: 0; z-index: var(--z-modal); background: rgba(5,15,38,0.94); display: none; place-items: center; padding: var(--gutter); }
    .lightbox.is-open { display: grid; }
    .lightbox img { max-width: 92vw; max-height: 84vh; border-radius: var(--r-md); box-shadow: var(--shadow-xl); }
    .lightbox__btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; border-radius: 50%; background: var(--glass-navy); border: 1px solid var(--glass-navy-border); color: #fff; display: grid; place-items: center; }
    .lightbox__prev { left: var(--s-5); } .lightbox__next { right: var(--s-5); }
    .lightbox__close { position: absolute; top: var(--s-5); right: var(--s-5); width: 46px; height: 46px; border-radius: 50%; background: var(--glass-navy); border: 1px solid var(--glass-navy-border); color: #fff; display: grid; place-items: center; }
  </style>
</head>

<body data-page="gallery" data-header="solid">
  <main id="main">
    <section class="page-banner">
      <div class="container container-wide page-banner__inner">
        <nav class="crumbs" aria-label="Njia ya ukurasa"><a href="/">Nyumbani</a><span class="is-current">Picha</span></nav>
        <h1 class="mt-3">Mkusanyiko wa Picha</h1>
        <p class="mt-3">Picha za viwanja vyetu, ziara za wateja, hati na matukio mbalimbali ya SAM EMPIRE Kigamboni.</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-wide">
        <div class="gallery-filters" id="gallery-filters" role="tablist" aria-label="Chuja picha"></div>
        <div class="gallery-grid" id="gallery-grid">
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
          <div class="card-skeleton skeleton" style="aspect-ratio:4/3;height:auto"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Picha kubwa">
    <button class="lightbox__close" id="lb-close" aria-label="Funga"><svg viewBox="0 0 24 24" width="22" height="22" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    <button class="lightbox__btn lightbox__prev" id="lb-prev" aria-label="Iliyopita"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <img id="lb-img" src="" alt="" />
    <button class="lightbox__btn lightbox__next" id="lb-next" aria-label="Inayofuata"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>

  <script type="module" src="/assets/js/partials.js"></script>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/gallery.js"></script>
</body>
</html>
