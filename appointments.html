<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miadi — SAM EMPIRE Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#081F4D" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <script>(function(){try{var r=localStorage.getItem("sam:theme");document.documentElement.setAttribute("data-theme",r?JSON.parse(r):"light");}catch(e){}})();</script>
</head>
<body data-page="appointments" data-title="Miadi ya Ziara">
  <div class="admin-gate" id="admin-gate"><div class="admin-loading"><span class="spinner" style="width:40px;height:40px"></span></div></div>
  <div class="admin-shell" id="admin-shell" hidden>
    <div class="admin-main">
      <div class="admin-content" id="admin-content">
        <div class="admin-toolbar">
          <input class="input" id="a-search" type="search" placeholder="Tafuta jina, simu au msimbo…" />
          <select class="select" id="a-status"><option value="">Hali zote</option><option value="new">Mpya</option><option value="confirmed">Imethibitishwa</option><option value="completed">Imekamilika</option><option value="cancelled">Imeghairiwa</option></select>
          <div class="admin-toolbar__spacer"></div>
          <span class="text-sm text-muted" id="a-total"></span>
        </div>
        <div class="panel"><div class="atable-wrap"><table class="atable">
          <thead><tr><th>Mteja</th><th>Kiwanja</th><th>Tarehe / Saa</th><th>Hali</th><th>Imeombwa</th><th></th></tr></thead>
          <tbody id="appt-tbody"><tr><td colspan="6" class="text-center text-muted" style="padding:var(--s-8)">Inapakia…</td></tr></tbody>
        </table></div></div>
      </div>
    </div>
  </div>
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
  <script type="module" src="/assets/js/script.js"></script>
  <script type="module" src="/assets/js/admin-core.js"></script>
  <script type="module" src="/assets/js/admin-appointments.js"></script>
</body>
</html>
